<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trang Cá Nhân - Thang Ngọc Luân</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            margin: 0; padding: 0; 
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); 
            color: #e0f7fa; 
            min-height: 100vh;
        }
        header { 
            background: linear-gradient(to right, #00b4d8, #0077b6); 
            padding: 70px 20px; text-align: center; 
            box-shadow: 0 10px 30px rgba(0,180,216,0.5);
        }
        h1 { font-family: 'Orbitron', sans-serif; letter-spacing: 2px; }
        nav { 
            background: rgba(0,180,216,0.4); 
            overflow: hidden; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px);
        }
        nav a { 
            float: left; color: #e0f7fa; 
            text-align: center; padding: 20px 30px; 
            text-decoration: none; font-weight: 600; 
            transition: all 0.4s;
        }
        nav a:hover { color: #00d4ff; text-shadow: 0 0 15px #00d4ff; transform: translateY(-5px); }
        section { 
            padding: 90px 20px; text-align: center; 
            animation: pulse 2s infinite alternate;
        }
        @keyframes pulse { from { opacity: 0.9; } to { opacity: 1; } }
        .card { 
            background: rgba(255,255,255,0.08); 
            border-radius: 20px; padding: 50px; 
            max-width: 1000px; margin: 0 auto; 
            box-shadow: 0 15px 40px rgba(0,180,216,0.4); 
            border: 1px solid #00b4d8; transition: all 0.5s;
        }
        .card:hover { box-shadow: 0 25px 60px rgba(0,212,255,0.6); transform: scale(1.02); }
        img { 
            max-width: 100%; border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.6); 
            transition: transform 0.6s, filter 0.6s;
        }
        img:hover { transform: scale(1.08); filter: brightness(1.2); }
        footer { 
            background: rgba(0,55,100,0.8); 
            color: #e0f7fa; text-align: center; 
            padding: 25px; margin-top: 70px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Thang Ngọc Luân's Space! ⚡🔵</h1>
    </header>
    <nav>
        <a href="index.html">Trang chủ</a>
        <a href="about.html">Giới thiệu</a>
        <a href="admissions.html">Tuyển sinh đại học</a>
    </nav>
    <section>
        <div class="card">
            <h2>Yo, mình là Luân đây! 🚀</h2>
            <p>Profile tech + năng lượng cao. Khám phá thêm về mình và info thi đại học nhé!</p>
            <img src="https://images.unsplash.com/photo-1555066931-4365d14bab8c?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Coder trẻ cool vibe tech, màn hình code neon">
        </div>
    </section>
    <footer>
        <p>© 2026 Thang Ngọc Luân - Level up every day! 🔵</p>
    </footer>
</body>
</html>
